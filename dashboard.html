<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Management — BØDEN</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --border: #2a2a2a;
            --accent: #99CCCC;
            --text-main: #e5e5e5;
            --text-dim: #737373;
            --glass: rgba(255, 255, 255, 0.03);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--accent);
            font-size: 1.25rem;
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            animation: fadeIn 0.5s ease-out both;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            margin-top: 0;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2::before {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* Now Playing */
        .now-playing {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .artwork-placeholder {
            width: 80px;
            height: 80px;
            background: var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .track-info h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
        }

        .track-info p {
            margin: 0.25rem 0 0;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .progress-container {
            margin-top: 1.5rem;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 100%;
            transition: width 1s linear;
        }

        /* Library Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 0.7rem;
            color: var(--text-dim);
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:hover td {
            background: var(--glass);
        }

        .btn {
            background: var(--border);
            color: var(--text-main);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--accent);
            color: black;
        }

        .btn-primary {
            background: var(--accent);
            color: black;
            font-weight: 600;
        }

        .btn-danger {
            color: #ff4d4d;
        }

        .btn-danger:hover {
            background: #ff4d4d;
            color: white;
        }

        /* Controls */
        .control-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">BØDEN // ADMIN</div>
        <div id="server-time" style="font-family: monospace; font-size: 0.9rem; opacity: 0.8;">--:--:--</div>
    </header>

    <main>
        <div class="content-left">
            <div class="section glass-panel">
                <h2>Now Playing</h2>
                <div class="now-playing">
                    <div class="artwork-placeholder">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                    </div>
                    <div class="track-info">
                        <h1 id="current-title">Loading Stream...</h1>
                        <p id="current-artist">Connecting to Liquidsoap</p>
                    </div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress"></div>
                </div>
            </div>

            <div class="section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="margin: 0;">Media Library</h2>
                    <input type="file" id="file-input" style="display: none;" onchange="handleUpload(this)">
                    <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">Upload
                        Track</button>
                </div>
                <table id="track-table">
                    <thead>
                        <tr>
                            <th>Filename</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="2" style="text-align: center; color: var(--text-dim);">Scanning for tracks...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="content-right">
            <div class="section">
                <h2>Broadcast Controls</h2>
                <div class="control-group">
                    <label>Master Volume</label>
                    <input id="vol-slider" type="range" min="0" max="100" value="100"
                        onchange="updateVolume(this.value)">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <button class="btn" style="width: 100%;" onclick="sendCommand('skip')">Skip Current Track</button>
                    <button class="btn" style="width: 100%;" onclick="fetchTracks()">Refresh Library</button>
                </div>
            </div>

            <div class="section">
                <h2>System Status</h2>
                <div style="font-size: 0.8rem; color: var(--text-dim); line-height: 1.6;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>Source:</span> <span style="color: var(--accent);">Liquidsoap Harbor</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>Icecast:</span> <span style="color: var(--accent);">Port 9090</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('current-title').textContent = data.title || "Unknown Title";
                document.getElementById('current-artist').textContent = data.artist || "Unknown Artist";
                document.getElementById('server-time').textContent = data.time || "00:00:00";
            } catch (e) { }
        }

        async function fetchTracks() {
            try {
                const res = await fetch('/api/tracks');
                const tracks = await res.json();
                const tbody = document.querySelector('#track-table tbody');
                tbody.innerHTML = '';
                if (!tracks || tracks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: var(--text-dim);">Library is empty. Upload some MP3s!</td></tr>';
                    return;
                }
                tracks.forEach(track => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${track}</td>
                        <td style="text-align: right;">
                            <button class="btn" onclick="playTrack('${encodeURIComponent(track)}')">Queue</button>
                            <button class="btn btn-danger" onclick="deleteTrack('${encodeURIComponent(track)}')">×</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) { }
        }

        async function playTrack(file) {
            await fetch('/api/play', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file: decodeURIComponent(file) })
            });
            fetchStatus();
        }

        async function deleteTrack(file) {
            if (!confirm(`Delete ${decodeURIComponent(file)}?`)) return;
            await fetch('/api/tracks', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file: decodeURIComponent(file) })
            });
            fetchTracks();
        }

        async function handleUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const btn = document.querySelector('.btn-primary');
            const originalText = btn.textContent;
            btn.textContent = 'Uploading...';
            btn.disabled = true;

            try {
                const res = await fetch(`/api/upload?name=${encodeURIComponent(file.name)}`, {
                    method: 'POST',
                    body: file
                });
                if (res.ok) {
                    alert('Upload successful!');
                    fetchTracks();
                } else {
                    alert('Upload failed');
                }
            } catch (e) {
                alert('Connection error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
                input.value = '';
            }
        }

        async function sendCommand(cmd) {
            await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cmd })
            });
        }

        async function updateVolume(val) {
            await fetch('/api/volume', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ volume: val })
            });
        }

        setInterval(fetchStatus, 3000);
        fetchTracks();
    </script>
</body>

</html>
